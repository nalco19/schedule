<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Agenda</title>
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Agenda" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="appHeader">
    <div class="header-left">
      <button class="icon-btn" id="menuToggle" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Agenda</span>
      </div>
    </div>
    <div class="header-center">
      <button class="nav-btn" id="prevBtn">‹</button>
      <button class="today-btn" id="todayBtn">Hoje</button>
      <button class="nav-btn" id="nextBtn">›</button>
      <h2 id="currentPeriodLabel"></h2>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="searchToggle" aria-label="Pesquisar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </header>

  <div id="searchBar" class="search-bar hidden">
    <input type="text" id="searchInput" placeholder="Pesquisar eventos..." autocomplete="off" />
    <div id="searchResults" class="search-results"></div>
  </div>

  <div id="viewTabs">
    <button class="tab-btn active" data-view="week">Semana</button>
    <button class="tab-btn" data-view="day">Dia</button>
    <button class="tab-btn" data-view="month">Mês</button>
  </div>

  <main id="mainContent"></main>

  <div id="sidebarOverlay" class="hidden"></div>
  <aside id="sidebar" class="hidden">
    <div class="sidebar-header">
      <span class="logo-text">Agenda</span>
      <button class="icon-btn" id="sidebarClose">✕</button>
    </div>
    <div class="sidebar-section">
      <h3>Categorias</h3>
      <div id="categoryList"></div>
      <button class="add-cat-btn" id="addCategoryBtn">+ Nova categoria</button>
    </div>
    <div class="sidebar-section">
      <h3>Notificações</h3>
      <label class="toggle-row">
        <span>Ativar lembretes</span>
        <div class="toggle-wrap">
          <input type="checkbox" id="notifToggle" />
          <span class="toggle-slider"></span>
        </div>
      </label>
      <p class="sidebar-hint">Notificação 15 min antes de cada evento com lembrete.</p>
    </div>
    <div class="sidebar-section">
      <button class="export-btn" id="exportBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar .ics
      </button>
    </div>
    <div class="sidebar-section hidden" id="installSection">
      <button class="install-btn" id="installBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18.01"/></svg>
        Instalar app no ecrã
      </button>
    </div>
  </aside>

  <button class="fab" id="fabBtn" aria-label="Novo evento">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- EVENT MODAL -->
  <div id="modalOverlay" class="modal-overlay hidden">
    <div id="eventModal" class="modal-sheet">
      <div class="modal-drag-handle"></div>
      <div class="modal-header">
        <h2 id="modalTitle">Novo Evento</h2>
        <button class="icon-btn" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <input type="text" id="evtTitle" placeholder="Título do evento" class="modal-input big-input" />
        <div class="form-row">
          <div class="form-group">
            <label>Data</label>
            <input type="date" id="evtDate" class="modal-input" />
          </div>
          <div class="form-group">
            <label>Início</label>
            <input type="time" id="evtStart" class="modal-input" />
          </div>
          <div class="form-group">
            <label>Fim</label>
            <input type="time" id="evtEnd" class="modal-input" />
          </div>
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <div id="modalCategoryPicker" class="category-picker"></div>
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <textarea id="evtDesc" class="modal-input" placeholder="Notas, localização..." rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>Lembrete</label>
          <select id="evtReminder" class="modal-input">
            <option value="">Sem lembrete</option>
            <option value="0">Na hora</option>
            <option value="15" selected>15 min antes</option>
            <option value="30">30 min antes</option>
            <option value="60">1 hora antes</option>
            <option value="1440">1 dia antes</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger hidden" id="deleteEvtBtn">Eliminar</button>
        <button class="btn-primary" id="saveEvtBtn">Guardar</button>
      </div>
    </div>
  </div>

  <!-- CATEGORY MODAL -->
  <div id="catModalOverlay" class="modal-overlay hidden">
    <div id="catModal" class="modal-sheet">
      <div class="modal-drag-handle"></div>
      <div class="modal-header">
        <h2>Nova Categoria</h2>
        <button class="icon-btn" id="catModalClose">✕</button>
      </div>
      <div class="modal-body">
        <input type="text" id="catName" placeholder="Nome da categoria" class="modal-input big-input" />
        <div class="color-swatches" id="colorSwatches"></div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="saveCatBtn">Criar</button>
      </div>
    </div>
  </div>

  <div id="toastContainer"></div>
  <script src="app.js"></script>
</body>
</html>
