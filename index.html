<!DOCTYPE html>
<html lang="pt">
<head> <link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Semanal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-blur blur-1"></div>
  <div class="bg-blur blur-2"></div>
  <div class="bg-blur blur-3"></div>

  <div class="app-shell">
    <section class="stats-row">
      <div class="stat-card">
        <span class="stat-label">Dias</span>
        <strong id="dayCount">0</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">Blocos</span>
        <strong>3 por dia</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">Guardar</span>
        <strong>No navegador</strong>
      </div>
    </section>

    <main>
      <section id="scheduleGrid" class="schedule-grid"></section>
    </main>

    <footer class="footer-note">
      <strong>Dica:</strong> agora pode trocar o nome de cada dia diretamente na app. Exemplo: mudar “Sab 28 MAR” para “Seg 6 ABR”.
    </footer>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
