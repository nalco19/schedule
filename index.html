<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Semanal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 8px;
    }

    #controls {
      margin-bottom: 16px;
    }

    button {
      margin-right: 8px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    #scheduleGrid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .day-card {
      background: white;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .day-header {
      margin-bottom: 8px;
    }

    .block {
      margin-top: 8px;
    }

    textarea {
      width: 100%;
      min-height: 60px;
      margin-top: 4px;
      border-radius: 6px;
      border: 1px solid #ccc;
      padding: 6px;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: black;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h1>Agenda Semanal</h1>
  <p>Total de dias: <span id="dayCount"></span></p>

  <div id="controls">
    <button id="saveBtn">Guardar</button>
    <button id="resetBtn">Repor</button>
    <button id="exportBtn">Exportar</button>
  </div>

  <div id="scheduleGrid"></div>

  <!-- DADOS INICIAIS (IMPORTANTE!) -->
  <script>
    window.DEFAULT_SCHEDULE = [
      { day: "Segunda", morning: "", afternoon: "", night: "" },
      { day: "Terça", morning: "", afternoon: "", night: "" },
      { day: "Quarta", morning: "", afternoon: "", night: "" },
      { day: "Quinta", morning: "", afternoon: "", night: "" },
      { day: "Sexta", morning: "", afternoon: "", night: "" },
      { day: "Sábado", morning: "", afternoon: "", night: "" },
      { day: "Domingo", morning: "", afternoon: "", night: "" }
    ];
  </script>

  <!-- SCRIPT DA APP -->
  <script src="app.js" defer></script>

</body>
</html>
